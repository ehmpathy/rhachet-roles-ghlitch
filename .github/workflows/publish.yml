name: publish

on:
  push:
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # per [workflow] x [branch, tag]
  cancel-in-progress: true #  cancel workflows for non-latest commits

permissions:
  id-token: write # required for oidc
  contents: read

jobs:
  test:
    uses: ./.github/workflows/.test.yml
    with:
      creds-aws-region: us-east-1
      creds-aws-role-arn: arn:aws:iam::805192865516:role/ehmpathy-demo-oidc # use aws auth via oidc
    secrets: inherit # keyrack firewall in .test.yml filters to declared keys

  publish:
    uses: ./.github/workflows/.publish-npm.yml
    needs: [test]
